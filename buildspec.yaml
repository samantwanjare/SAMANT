version: 0.2

env:
  variables:
    IMAGE_REPO_NAME: demo-notes-app
    IMAGE_TAG: latest
    AWS_DEFAULT_REGION: us-east-1

phases:
  install:
    runtime-versions:
      docker: 20
    commands:
      - echo "Starting installation phase..."

  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

      - REPOSITORY_URI=$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME

      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI

      - echo "Build started on $(date)"

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG .

      - echo "Tagging image..."
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo "Pushing Docker image..."
      - docker push $REPOSITORY_URI:$IMAGE_TAG

      - echo "Generating image definitions file..."

      - printf '[{"name":"demo-notes-app","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

      - echo "Build completed on $(date)"

artifacts:
  files:
    - '**/*'
