# Create docker-compose.yml

version: '3.8'

services:
  db:
    image: mysql:8
    container_name: notes-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notesdb
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  notes-app:
    image: manishvishwa801/notes-app:latest
    container_name: notes-app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: notesdb
      DB_USER: root
      DB_PASSWORD: root
      DB_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    restart: always
    command: >
    sh -c "python manage.py migrate &&
           python manage.py runserver 0.0.0.0:8000"


volumes:
  db_data:
